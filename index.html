<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
  <main class="login-card">
    <img src="assets/logo.svg" alt="Portal logo">
    <h1>Login</h1>
    <p class="hint">Student Portal System</p>
    <form onsubmit="loginUser(event)">
      <div class="mb-3">
        <span class="tiny-label">Username</span>
        <input type="text" id="username" class="form-control" placeholder="Enter here" required>
      </div>
      <div class="mb-3">
        <span class="tiny-label">Password</span>
        <input type="password" id="password" class="form-control" placeholder="Enter here" required>
      </div>
      <div class="form-check text-start my-3">
        <input class="form-check-input" type="checkbox" id="stay" checked>
        <label class="form-check-label small" for="stay">Stay logged in</label>
        <p class="hint ms-4">Your session will stay active on this device.</p>
      </div>
      <button type="submit" class="btn btn-portal">Login</button>
      <button type="reset" class="btn btn-portal cancel-btn ms-2">Cancel</button>
    </form>
      <p id="loginMessage" class="text-danger mt-3"></p>
      <hr><p class="hint">Demo account: student / ict9</p>
  </main>
  <script src="proj.js">
  </script>
</body>
</html>
